<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --floor:#f0e8d0;--wall:#8faabf;--desk:#c8925a;--desk-s:#9a6a38;
  --bg:#0c1020;--panel:rgba(6,10,22,0.97);--border:#1a3058;

body{background:var(--bg);overflow:hidden;}
#root{width:100vw;height:100vh;position:relative;overflow:hidden;}
.scene-outer{position:absolute;top:0;left:0;right:0;bottom:0;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;justify-content:center;padding:20px;}
.scene-wrap{transform:perspective(1600px) rotateX(14deg);transform-origin:center top;flex-shrink:0;}
.office{position:relative;width:1330px;height:690px;background:var(--floor);border:5px solid #5a7a90;box-shadow:0 28px 80px rgba(0,0,0,.85),inset 0 0 60px rgba(0,0,0,.06);}
.office::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
.back-wall{position:absolute;top:-78px;left:-5px;right:-5px;height:82px;background:var(--wall);border-bottom:4px solid #5a7a90;display:flex;align-items:center;padding:8px 30px;gap:40px;}
.back-wall::before{content:'🐾 APEX — AI ANIMAL HEADQUARTERS';position:absolute;left:50%;transform:translateX(-50%);font-family:var(--pixel);font-size:10px;color:rgba(255,255,255,.18);letter-spacing:3px;white-space:nowrap;}
.ww{width:88px;height:58px;background:linear-gradient(150deg,rgba(200,240,255,.65),rgba(140,200,240,.35));border:4px solid #4a6a88;display:grid;grid-template:1fr 1fr/1fr 1fr;gap:3px;padding:4px;}
.ww div{background:rgba(180,225,255,.45);}
.zone{position:absolute;border-radius:4px;border:2px solid;}
.zone-head{height:24px;display:flex;align-items:center;padding:0 9px;gap:5px;font-family:var(--pixel);font-size:5px;font-weight:bold;letter-spacing:.5px;border-radius:3px 3px 0 0;}
.zone-fill{position:absolute;top:24px;left:0;right:0;bottom:0;border-radius:0 0 3px 3px;}
.zone-body{position:relative;}
.desk{position:absolute;width:88px;cursor:pointer;transition:transform .15s,filter .15s;}
.desk:hover{transform:scale(1.07) translateY(-2px);filter:brightness(1.08);}
.desk-top{height:60px;background:var(--desk);border:2px solid var(--desk-s);border-radius:3px 3px 0 0;box-shadow:0 2px 0 var(--desk-s),0 5px 12px rgba(0,0,0,.25);position:relative;overflow:visible;}
.desk-top::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(0,0,0,.04) 10px,rgba(0,0,0,.04) 11px);pointer-events:none;}
.desk-front{height:5px;background:var(--desk-s);border-radius:0 0 2px 2px;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.mzone{position:absolute;background:rgba(255,215,0,.07);border:2px solid rgba(255,215,0,.3);border-radius:4px;}
.mzone-head{height:24px;background:rgba(255,215,0,.12);border-bottom:1px solid rgba(255,215,0,.2);display:flex;align-items:center;padding:0 10px;gap:6px;font-family:var(--pixel);font-size:5px;color:#ffd700;}
.mtable{position:absolute;border-radius:50%;background:#7a4e28;border:4px solid #5a3810;box-shadow:0 4px 0 #3a2008,0 8px 20px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;}
.meet-hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-family:var(--pixel);font-size:4px;color:rgba(255,215,0,.65);white-space:nowrap;cursor:pointer;}
.hugo-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:9;transition:transform .15s;}
.hugo-wrap:hover{transform:scale(1.1) translateY(-5px);}
.hugo-desk{width:112px;height:56px;background:#8b4513;border:3px solid #5a2a08;border-radius:4px 4px 0 0;box-shadow:0 3px 0 #3a1a04,0 6px 16px rgba(0,0,0,.4);position:relative;}
.pc-wrap{position:absolute;top:3px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;}
.mon-3d{transform:perspective(120px) rotateX(-8deg);display:flex;flex-direction:column;align-items:center;}
.mon-bezel{width:54px;height:40px;background:linear-gradient(160deg,#2c2c2c,#1a1a1a);border:2px solid #0e0e0e;border-radius:3px;padding:3px;position:relative;box-shadow:2px 4px 14px rgba(0,0,0,.85),0 1px 0 rgba(255,255,255,.06) inset;}
.mon-bezel::before{content:'';position:absolute;top:-7px;left:1px;right:1px;height:7px;background:linear-gradient(180deg,#3c3c3c,#2a2a2a);border-radius:3px 3px 0 0;border:1px solid #0e0e0e;border-bottom:none;transform-origin:bottom;transform:rotateX(50deg);}
.mon-bezel::after{content:'';position:absolute;top:1px;right:-6px;bottom:1px;width:6px;background:linear-gradient(90deg,#252525,#181818);border-radius:0 3px 3px 0;border:1px solid #0e0e0e;border-left:none;}
.mon-cam{position:absolute;top:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#111;box-shadow:0 0 4px rgba(0,150,255,.3);}
.mon-screen{width:100%;height:100%;background:linear-gradient(160deg,#061828,#0a2444 60%,#041020);border-radius:1px;overflow:hidden;position:relative;}
.mon-screen::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.16) 2px,rgba(0,0,0,.16) 3px);pointer-events:none;z-index:2;}
.mon-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(0,160,255,.14),transparent 70%);pointer-events:none;z-index:1;}
.scr-in{position:absolute;inset:3px;z-index:3;display:flex;flex-direction:column;gap:2px;}
.scr-ref{position:absolute;top:2px;left:2px;width:14px;height:7px;background:linear-gradient(135deg,rgba(255,255,255,.09),transparent);border-radius:2px;z-index:4;pointer-events:none;}
.scr-bar{height:2px;border-radius:1px;opacity:.75;}
.scr-row{display:flex;gap:2px;align-items:center;}
.scr-dot{width:3px;height:3px;border-radius:50%;}
.scr-line{height:1px;flex:1;background:rgba(255,255,255,.1);}
.scr-cur{width:2px;height:5px;background:#00ff88;animation:cur .9s step-end infinite;margin-left:1px;}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
.mon-neck{width:6px;height:9px;background:linear-gradient(90deg,#222,#2e2e2e,#222);}
.mon-base{width:30px;height:5px;background:linear-gradient(180deg,#2e2e2e,#1e1e1e);border-radius:2px;box-shadow:0 2px 6px rgba(0,0,0,.6);position:relative;}
.mon-base::after{content:'';position:absolute;right:-4px;top:0;bottom:0;width:4px;background:linear-gradient(90deg,#1e1e1e,#141414);border-radius:0 2px 2px 0;}
.kbd{position:absolute;bottom:3px;left:50%;width:52px;height:10px;background:linear-gradient(180deg,#2e2e2e,#222);border:1.5px solid #111;border-radius:2px;box-shadow:0 2px 0 #111,2px 3px 8px rgba(0,0,0,.6);transform:perspective(80px) rotateX(-14deg) translateX(-50%);transform-origin:bottom center;overflow:hidden;}
.kbd::before{content:'';position:absolute;top:2px;left:4px;right:4px;height:1px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.15) 0,rgba(255,255,255,.15) 3px,transparent 3px,transparent 5px);}
.kbd::after{content:'';position:absolute;bottom:2px;left:6px;right:6px;height:1px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0,rgba(255,255,255,.08) 4px,transparent 4px,transparent 7px);}
.mse{position:absolute;bottom:5px;right:4px;width:10px;height:14px;background:linear-gradient(160deg,#333,#1e1e1e);border:1.5px solid #111;border-radius:5px 5px 4px 4px;box-shadow:2px 2px 6px rgba(0,0,0,.7);}
.mse::before{content:'';position:absolute;top:3px;left:50%;transform:translateX(-50%);width:1.5px;height:6px;background:rgba(255,255,255,.15);}
.desk-mug{position:absolute;top:4px;right:3px;font-size:12px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.65);}
.agent{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:10;transition:transform .15s;}
.agent:hover{transform:scale(1.1) translateY(-5px);}
.cpanel{position:fixed;right:0;top:0;bottom:0;width:355px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;animation:sIn .2s ease-out;backdrop-filter:blur(14px);}
@keyframes sIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cp-head{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;background:rgba(8,14,32,.9);flex-shrink:0;}
.cp-av{width:38px;height:38px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cp-name{font-weight:600;font-size:14px;margin-bottom:2px;}
.cp-role{font-family:var(--pixel);font-size:5px;color:#3a5a7f;}
.cp-dept{display:inline-block;font-family:var(--pixel);font-size:4px;padding:2px 7px;border-radius:20px;border:1px solid;margin-top:4px;}
.cp-x{margin-left:auto;background:none;border:none;color:#2a4060;font-size:20px;cursor:pointer;}
.cp-x:hover{color:#f87171;}
.cp-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;scrollbar-width:thin;}
.cmsg{display:flex;flex-direction:column;gap:3px;}
.cmsg.u{align-items:flex-end}
.cmsg-meta{font-family:var(--pixel);font-size:4px;color:#1e3860;padding:0 4px;}
.cmsg-b{max-width:88%;padding:8px 12px;border-radius:4px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;font-family:var(--mono);}
.cmsg-b.u{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);color:#c8e0ff;border-bottom-right-radius:0;}
.cmsg-b.a{background:rgba(12,22,46,.8);border:1px solid;color:#c8e0ff;border-bottom-left-radius:0;}
.cmsg-b.s{background:rgba(0,0,0,.3);border:1px dashed #1a3050;color:#2a4a6f;font-family:var(--pixel);font-size:9px;align-self:center;max-width:100%;text-align:center;}
.cmsg-think{max-width:88%;padding:8px 12px;border-radius:4px;border:1px solid;border-bottom-left-radius:0;display:flex;gap:5px;align-items:center;background:rgba(12,22,46,.6);font-family:var(--pixel);font-size:5px;}
.cp-bar{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0;background:rgba(5,8,18,.8);}
.cp-ta{flex:1;background:rgba(12,22,46,.8);border:1px solid var(--border);color:#c8e0ff;font-family:var(--mono);font-size:13px;padding:8px 10px;border-radius:3px;resize:none;outline:none;min-height:38px;max-height:90px;}
.cp-ta:focus{border-color:#2a5a8f;}
.cp-send{background:#22c55e;color:#000;border:none;font-family:var(--pixel);font-size:6px;padding:0 11px;border-radius:3px;cursor:pointer;height:38px;}
.cp-send:hover{background:#16a34a;}
.cp-send:disabled{background:#1a3050;color:#2a4060;cursor:not-allowed;}
.v-btn{width:38px;height:38px;border-radius:3px;border:1px solid var(--border);background:transparent;color:#3a5a7f;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.v-btn:hover{border-color:#60a5fa;color:#60a5fa;}
.v-btn.on{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1);animation:pmic 1s infinite;}
@keyframes pmic{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.dot{width:4px;height:4px;border-radius:50%;animation:dota 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dota{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
.mpanel{position:fixed;inset:0;background:rgba(3,6,16,.97);display:flex;flex-direction:column;z-index:300;animation:fIn .25s ease-out;}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.mp-head{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:rgba(5,8,18,.9);flex-shrink:0;}
.mp-title{font-family:var(--pixel);font-size:10px;color:#ffd700;}

.cfg-f{margin-bottom:11px;}
.cfg-l{font-family:var(--pixel);font-size:5px;color:#2a4a6f;margin-bottom:4px;}

.cfg-res{font-family:var(--pixel);font-size:5px;padding:7px 10px;border-radius:3px;margin-top:10px;}
.cr-ok{color:#22c55e;background:rgba(34,197,94,.07);border:1px solid #22c55e;}
.cr-err{color:#f87171;background:rgba(248,113,113,.07);border:1px solid #f87171;}
.cr-info{color:#60a5fa;background:rgba(96,165,250,.07);border:1px solid #60a5fa;}
.rug{position:absolute;border-radius:6px;opacity:.45;}
.plant{position:absolute;font-size:22px;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.45));}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1a3058;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#2a4a78;}
</style>

async function callAgent(cfg,system,messages){
  try {
    const r=await fetch(cfg.endpoint+'/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':cfg.token,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:cfg.model,max_tokens:Number(cfg.maxTokens)||2048,system,messages})
    });
    if(!r.ok){throw new Error('HTTP '+r.status);}
    const d=await r.json();
    return d?.content?.[0]?.text || d?.choices?.[0]?.message?.content || 'No response.';
  } catch(e){ throw e; }
}

          React.createElement('div',{className:'rug',style:{left:876,top:243,width:196,height:185,background:'#2a5a5a'}}),
          React.createElement('div',{className:'rug',style:{left:10,top:466,width:420,height:200,background:'#3a5a3a'}}),
          ...[[1300,10],[1300,200],[1300,400],[1300,590],[10,654],[230,656],[450,656],[660,656],[870,656],[1080,656],[0,445],[0,220]].map(([x,y],i)=>
            React.createElement('div',{key:i,className:'plant',style:{left:x,top:y}},'🌿')
          ),

          /* ZONES */
          ...DEPTS.map(d=>React.createElement(Zone,{key:d.id,dept:d,onAgentClick:open,activeId:active?.agent?.id})),

          /* MEETING ROOM */
          React.createElement('div',{className:'mzone',style:{left:MZONE.x,top:MZONE.y,width:MZONE.w,height:MZONE.h}},
            React.createElement('div',{className:'mzone-head'},'🏢 ',React.createElement('span',null,'MEETING ROOM')),
            React.createElement('div',{className:'mtable',style:{left:MZONE.w/2-74,top:28,width:148,height:108}},
              React.createElement('span',{style:{fontSize:30}},'☕')
            ),
            React.createElement('div',{className:'meet-hint',onClick:()=>setShowMeet(true)},'▶ CLICK TABLE — START MEETING'),

            /* HUGO IN MEETING ROOM */
            React.createElement('div',{className:'hugo-wrap',style:{position:'absolute',left:MZONE.w/2-56,top:90},onClick:()=>open(HUGO,{color:'#ffd700',name:'EXECUTIVE'})},
              React.createElement('div',{className:'hugo-desk'},
                React.createElement(HugoDesk,null)
              ),
              React.createElement(CharAvatar,{agent:HUGO,deptColor:'#ffd700',isActive:active?.agent?.id==='hugo',isHugo:true})
            )
          ),

          /* EXECUTIVE AREA LABEL */
          React.createElement('div',{style:{position:'absolute',left:225,top:456,width:200,height:218,background:'rgba(255,215,0,.03)',border:'2px dashed rgba(255,215,0,.12)',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center'}},
            React.createElement('span',{style:{fontFamily:"'Press Start 2P'",fontSize:5,color:'rgba(255,215,0,0.18)'}},'EXECUTIVE AREA')
          ),

          /* FOOTER HINT */
          React.createElement('div',{style:{position:'absolute',bottom:6,left:'50%',transform:'translateX(-50%)',fontFamily:"'Press Start 2P'",fontSize:'5px',color:'rgba(255,255,255,0.1)',pointerEvents:'none',whiteSpace:'nowrap'}},'CLICK AGENT TO CHAT · CLICK TABLE FOR MEETING'),

          /* BOTTOM BAR */
          React.createElement('div',{style:{position:'absolute',bottom:0,left:0,right:0,height:46,background:'rgba(5,8,18,0.98)',borderTop:'1px solid #1a3058',display:'flex',alignItems:'center',padding:'0 16px',gap:12}},
            React.createElement('span',{style:{fontFamily:"'Press Start 2P'",fontSize:9,color:'#ffd700',textShadow:'0 0 12px #ffd70080',letterSpacing:1}},'🐾 APEX HQ'),
            React.createElement('div',{style:{width:1,height:22,background:'#1a3058'}}),
            React.createElement('span',{style:{fontFamily:"'Press Start 2P'",fontSize:5,color:'#3a5a7f'}},'AI OFFICE · 11 DEPTS · 23 AGENTS'),
            React.createElement('div',{style:{marginLeft:'auto',display:'flex',gap:8}},
              React.createElement('button',{style:{fontFamily:"'Press Start 2P'",fontSize:6,padding:'6px 11px',borderRadius:3,cursor:'pointer',border:'1px solid rgba(255,215,0,0.4)',background:'transparent',color:'#ffd700'},onClick:()=>setShowMeet(true)},'🏢 TEAM MEETING'),
              React.createElement('button',{style:{fontFamily:"'Press Start 2P'",fontSize:6,padding:'6px 11px',borderRadius:3,cursor:'pointer',border:'1px solid #1a3058',background:'transparent',color:'#4a6a9f'},onClick:()=>{setCfgD(cfg);setShowCfg(true);setCfgRes(null);}},'⚙ CONFIG')
            )
          )
        )
      )
    ),

    /* OVERLAYS */
    active&&React.createElement(ChatPanel,{agentData:active.agent,dept:active.dept,cfg,onClose:()=>setActive(null)}),
    showMeet&&React.createElement(MeetingPanel,{cfg,onClose:()=>setShowMeet(false)}),

    showCfg&&React.createElement('div',{className:'cfg-ov'},
      React.createElement('div',{className:'cfg-box'},
        React.createElement('div',{className:'cfg-title'},'⚙ OPENCLAW CONFIG'),
        ...[['ENDPOINT','endpoint'],['API TOKEN','token'],['MODEL','model'],['MAX TOKENS','maxTokens']].map(([l,k])=>
          React.createElement('div',{key:k,className:'cfg-f'},
            React.createElement('div',{className:'cfg-l'},l),
            React.createElement('input',{className:'cfg-i',type:k==='token'?'password':'text',value:cfgD[k],onChange:e=>setCfgD(p=>({...p,[k]:e.target.value}))})
          )
        ),
        cfgRes&&React.createElement('div',{className:'cfg-res '+(cfgRes.t==='ok'?'cr-ok':cfgRes.t==='err'?'cr-err':'cr-info')},cfgRes.m),
        React.createElement('div',{className:'cfg-btns'},
          React.createElement('button',{className:'cfg-ok',onClick:()=>{setCfg(cfgD);setShowCfg(false);}},'SAVE & CLOSE'),
          React.createElement('button',{className:'cfg-test',onClick:testConn,disabled:testing,style:{fontFamily:"'Press Start 2P'",fontSize:6,padding:'9px 13px',borderRadius:3,cursor:'pointer',border:'1px solid #60a5fa',background:'transparent',color:'#60a5fa'}},testing?'TESTING...':'TEST CONNECTION'),
          React.createElement('button',{className:'cfg-cancel',onClick:()=>setShowCfg(false),style:{fontFamily:"'Press Start 2P'",fontSize:6,padding:'9px 12px',borderRadius:3,cursor:'pointer',border:'1px solid #1a3050',background:'transparent',color:'#2a4060'}},'CANCEL')
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ApexOffice));
</script>
</body>
</html>
