<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX HQ — Pixel Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --floor:#f0e8d0;--wall:#8faabf;--desk:#c8925a;--desk-s:#9a6a38;
  --bg:#0c1020;--panel:rgba(6,10,22,0.97);--border:#1a3058;
  --mono:'JetBrains Mono',monospace;--pixel:'Press Start 2P',monospace;
}
body{background:var(--bg);overflow:hidden;}
#root{width:100vw;height:100vh;position:relative;overflow:hidden;}
.scene-outer{position:absolute;top:0;left:0;right:0;bottom:0;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;justify-content:center;padding:20px;}
.scene-wrap{transform:perspective(1600px) rotateX(14deg);transform-origin:center top;flex-shrink:0;}
.office{position:relative;width:1330px;height:690px;background:var(--floor);border:5px solid #5a7a90;box-shadow:0 28px 80px rgba(0,0,0,.85),inset 0 0 60px rgba(0,0,0,.06);}
.office::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
.back-wall{position:absolute;top:-78px;left:-5px;right:-5px;height:82px;background:var(--wall);border-bottom:4px solid #5a7a90;display:flex;align-items:center;padding:8px 30px;gap:40px;}
.back-wall::before{content:'🐾 APEX — AI ANIMAL HEADQUARTERS';position:absolute;left:50%;transform:translateX(-50%);font-family:var(--pixel);font-size:10px;color:rgba(255,255,255,.18);letter-spacing:3px;white-space:nowrap;}
.ww{width:88px;height:58px;background:linear-gradient(150deg,rgba(200,240,255,.65),rgba(140,200,240,.35));border:4px solid #4a6a88;display:grid;grid-template:1fr 1fr/1fr 1fr;gap:3px;padding:4px;}
.ww div{background:rgba(180,225,255,.45);}
.zone{position:absolute;border-radius:4px;border:2px solid;}
.zone-head{height:24px;display:flex;align-items:center;padding:0 9px;gap:5px;font-family:var(--pixel);font-size:5px;font-weight:bold;letter-spacing:.5px;border-radius:3px 3px 0 0;}
.zone-fill{position:absolute;top:24px;left:0;right:0;bottom:0;border-radius:0 0 3px 3px;}
.zone-body{position:relative;}
.desk{position:absolute;width:88px;cursor:pointer;transition:transform .15s,filter .15s;}
.desk:hover{transform:scale(1.07) translateY(-2px);filter:brightness(1.08);}
.desk-top{height:60px;background:var(--desk);border:2px solid var(--desk-s);border-radius:3px 3px 0 0;box-shadow:0 2px 0 var(--desk-s),0 5px 12px rgba(0,0,0,.25);position:relative;overflow:visible;}
.desk-top::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(0,0,0,.04) 10px,rgba(0,0,0,.04) 11px);pointer-events:none;}
.desk-front{height:5px;background:var(--desk-s);border-radius:0 0 2px 2px;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.mzone{position:absolute;background:rgba(255,215,0,.07);border:2px solid rgba(255,215,0,.3);border-radius:4px;}
.mzone-head{height:24px;background:rgba(255,215,0,.12);border-bottom:1px solid rgba(255,215,0,.2);display:flex;align-items:center;padding:0 10px;gap:6px;font-family:var(--pixel);font-size:5px;color:#ffd700;}
.mtable{position:absolute;border-radius:50%;background:#7a4e28;border:4px solid #5a3810;box-shadow:0 4px 0 #3a2008,0 8px 20px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;}
.meet-hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-family:var(--pixel);font-size:4px;color:rgba(255,215,0,.65);white-space:nowrap;cursor:pointer;}
.hugo-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:9;transition:transform .15s;}
.hugo-wrap:hover{transform:scale(1.1) translateY(-5px);}
.hugo-desk{width:112px;height:56px;background:#8b4513;border:3px solid #5a2a08;border-radius:4px 4px 0 0;box-shadow:0 3px 0 #3a1a04,0 6px 16px rgba(0,0,0,.4);position:relative;}
.pc-wrap{position:absolute;top:3px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;}
.mon-3d{transform:perspective(120px) rotateX(-8deg);display:flex;flex-direction:column;align-items:center;}
.mon-bezel{width:54px;height:40px;background:linear-gradient(160deg,#2c2c2c,#1a1a1a);border:2px solid #0e0e0e;border-radius:3px;padding:3px;position:relative;box-shadow:2px 4px 14px rgba(0,0,0,.85),0 1px 0 rgba(255,255,255,.06) inset;}
.mon-bezel::before{content:'';position:absolute;top:-7px;left:1px;right:1px;height:7px;background:linear-gradient(180deg,#3c3c3c,#2a2a2a);border-radius:3px 3px 0 0;border:1px solid #0e0e0e;border-bottom:none;transform-origin:bottom;transform:rotateX(50deg);}
.mon-bezel::after{content:'';position:absolute;top:1px;right:-6px;bottom:1px;width:6px;background:linear-gradient(90deg,#252525,#181818);border-radius:0 3px 3px 0;border:1px solid #0e0e0e;border-left:none;}
.mon-cam{position:absolute;top:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#111;box-shadow:0 0 4px rgba(0,150,255,.3);}
.mon-screen{width:100%;height:100%;background:linear-gradient(160deg,#061828,#0a2444 60%,#041020);border-radius:1px;overflow:hidden;position:relative;}
.mon-screen::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.16) 2px,rgba(0,0,0,.16) 3px);pointer-events:none;z-index:2;}
.mon-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(0,160,255,.14),transparent 70%);pointer-events:none;z-index:1;}
.scr-in{position:absolute;inset:3px;z-index:3;display:flex;flex-direction:column;gap:2px;}
.scr-ref{position:absolute;top:2px;left:2px;width:14px;height:7px;background:linear-gradient(135deg,rgba(255,255,255,.09),transparent);border-radius:2px;z-index:4;pointer-events:none;}
.scr-bar{height:2px;border-radius:1px;opacity:.75;}
.scr-row{display:flex;gap:2px;align-items:center;}
.scr-dot{width:3px;height:3px;border-radius:50%;}
.scr-line{height:1px;flex:1;background:rgba(255,255,255,.1);}
.scr-cur{width:2px;height:5px;background:#00ff88;animation:cur .9s step-end infinite;margin-left:1px;}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
.mon-neck{width:6px;height:9px;background:linear-gradient(90deg,#222,#2e2e2e,#222);}
.mon-base{width:30px;height:5px;background:linear-gradient(180deg,#2e2e2e,#1e1e1e);border-radius:2px;box-shadow:0 2px 6px rgba(0,0,0,.6);position:relative;}
.mon-base::after{content:'';position:absolute;right:-4px;top:0;bottom:0;width:4px;background:linear-gradient(90deg,#1e1e1e,#141414);border-radius:0 2px 2px 0;}
.kbd{position:absolute;bottom:3px;left:50%;width:52px;height:10px;background:linear-gradient(180deg,#2e2e2e,#222);border:1.5px solid #111;border-radius:2px;box-shadow:0 2px 0 #111,2px 3px 8px rgba(0,0,0,.6);transform:perspective(80px) rotateX(-14deg) translateX(-50%);transform-origin:bottom center;overflow:hidden;}
.kbd::before{content:'';position:absolute;top:2px;left:4px;right:4px;height:1px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.15) 0,rgba(255,255,255,.15) 3px,transparent 3px,transparent 5px);}
.kbd::after{content:'';position:absolute;bottom:2px;left:6px;right:6px;height:1px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0,rgba(255,255,255,.08) 4px,transparent 4px,transparent 7px);}
.mse{position:absolute;bottom:5px;right:4px;width:10px;height:14px;background:linear-gradient(160deg,#333,#1e1e1e);border:1.5px solid #111;border-radius:5px 5px 4px 4px;box-shadow:2px 2px 6px rgba(0,0,0,.7);}
.mse::before{content:'';position:absolute;top:3px;left:50%;transform:translateX(-50%);width:1.5px;height:6px;background:rgba(255,255,255,.15);}
.desk-mug{position:absolute;top:4px;right:3px;font-size:12px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.65);}

/* WALKER AGENT */
.walker{position:absolute;display:flex;flex-direction:column;align-items:center;z-index:50;pointer-events:none;transition:none;}
.walker-inner{position:relative;}
/* Walking animation */
.walker.walking .chibi-svg{animation:walkerBounce 0.3s ease-in-out infinite alternate;}
@keyframes walkerBounce{from{transform:translateY(0) scaleY(1)}to{transform:translateY(-3px) scaleY(1.03)}}
/* Working/typing animation */
.walker.working .chibi-svg{animation:workerShake 0.4s ease-in-out infinite;}
@keyframes workerShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-1.5px)}75%{transform:translateX(1.5px)}}
/* Thinking animation */
.walker.thinking .chibi-svg{animation:thinkerBob 1.2s ease-in-out infinite;}
@keyframes thinkerBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
/* Handshake animation */
.walker.handshake .chibi-svg{animation:handshakeShake 0.5s ease-in-out infinite alternate;}
@keyframes handshakeShake{0%{transform:rotate(-8deg)}100%{transform:rotate(8deg)}}
/* Bubble */
.walker-bubble{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:rgba(4,7,18,.97);border:1.5px solid;border-radius:6px;padding:5px 8px;font-family:var(--mono);font-size:9px;max-width:140px;white-space:pre-wrap;word-break:break-word;color:#c8e0ff;line-height:1.5;pointer-events:none;z-index:60;margin-bottom:6px;}
.walker-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:rgba(4,7,18,.97);}
/* Idle at desk */
.walker.idle .chibi-svg{animation:idleBreathe 3s ease-in-out infinite;}
@keyframes idleBreathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02)}}

.agent{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:10;transition:transform .15s;}
.agent:hover{transform:scale(1.1) translateY(-5px);}

/* CHAT PANEL */
.cpanel{position:fixed;right:0;top:0;bottom:0;width:355px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;animation:sIn .2s ease-out;backdrop-filter:blur(14px);}
@keyframes sIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cp-head{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;background:rgba(8,14,32,.9);flex-shrink:0;}
.cp-av{width:38px;height:38px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cp-name{font-weight:600;font-size:14px;margin-bottom:2px;}
.cp-role{font-family:var(--pixel);font-size:5px;color:#3a5a7f;}
.cp-dept{display:inline-block;font-family:var(--pixel);font-size:4px;padding:2px 7px;border-radius:20px;border:1px solid;margin-top:4px;}
.cp-x{margin-left:auto;background:none;border:none;color:#2a4060;font-size:20px;cursor:pointer;}
.cp-x:hover{color:#f87171;}
.cp-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;scrollbar-width:thin;}
.cmsg{display:flex;flex-direction:column;gap:3px;}
.cmsg.u{align-items:flex-end}
.cmsg-meta{font-family:var(--pixel);font-size:4px;color:#1e3860;padding:0 4px;}
.cmsg-b{max-width:88%;padding:8px 12px;border-radius:4px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;font-family:var(--mono);}
.cmsg-b.u{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);color:#c8e0ff;border-bottom-right-radius:0;}
.cmsg-b.a{background:rgba(12,22,46,.8);border:1px solid;color:#c8e0ff;border-bottom-left-radius:0;}
.cmsg-b.s{background:rgba(0,0,0,.3);border:1px dashed #1a3050;color:#2a4a6f;font-family:var(--pixel);font-size:9px;align-self:center;max-width:100%;text-align:center;}
.cmsg-b.ai2ai{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);color:#ffd700;border-bottom-left-radius:0;font-style:italic;}
.cmsg-think{max-width:88%;padding:8px 12px;border-radius:4px;border:1px solid;border-bottom-left-radius:0;display:flex;gap:5px;align-items:center;background:rgba(12,22,46,.6);font-family:var(--pixel);font-size:5px;}
.cp-bar{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0;background:rgba(5,8,18,.8);}
.cp-ta{flex:1;background:rgba(12,22,46,.8);border:1px solid var(--border);color:#c8e0ff;font-family:var(--mono);font-size:13px;padding:8px 10px;border-radius:3px;resize:none;outline:none;min-height:38px;max-height:90px;}
.cp-ta:focus{border-color:#2a5a8f;}
.cp-send{background:#22c55e;color:#000;border:none;font-family:var(--pixel);font-size:6px;padding:0 11px;border-radius:3px;cursor:pointer;height:38px;}
.cp-send:hover{background:#16a34a;}
.cp-send:disabled{background:#1a3050;color:#2a4060;cursor:not-allowed;}
.v-btn{width:38px;height:38px;border-radius:3px;border:1px solid var(--border);background:transparent;color:#3a5a7f;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.v-btn:hover{border-color:#60a5fa;color:#60a5fa;}
.v-btn.on{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1);animation:pmic 1s infinite;}
@keyframes pmic{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.dot{width:4px;height:4px;border-radius:50%;animation:dota 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dota{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* MEETING PANEL */
.mpanel{position:fixed;inset:0;background:rgba(3,6,16,.97);display:flex;flex-direction:column;z-index:300;animation:fIn .25s ease-out;}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.mp-head{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:rgba(5,8,18,.9);flex-shrink:0;}
.mp-title{font-family:var(--pixel);font-size:10px;color:#ffd700;}
.mp-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.mp-chip{display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:20px;font-family:var(--pixel);font-size:4px;border:1px solid;}
.mp-x{margin-left:auto;background:none;border:none;color:#2a4060;font-size:22px;cursor:pointer;align-self:flex-start;}
.mp-x:hover{color:#f87171;}
.mp-feed{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;}
.mp-msg{display:flex;gap:12px;align-items:flex-start;}
.mp-av{width:36px;height:36px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.mp-body{flex:1;}
.mp-mname{font-family:var(--pixel);font-size:5px;margin-bottom:4px;}
.mp-text{background:rgba(10,18,40,.7);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-size:13px;line-height:1.7;color:#c8e0ff;font-family:var(--mono);white-space:pre-wrap;}
.mp-think{display:flex;gap:5px;align-items:center;padding:8px 12px;background:rgba(10,18,40,.5);border:1px solid var(--border);border-radius:4px;font-family:var(--pixel);font-size:5px;}
.mp-bar{padding:14px 22px;border-top:1px solid var(--border);background:rgba(5,8,18,.9);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
.mp-ta{flex:1;background:rgba(10,18,40,.8);border:1px solid var(--border);color:#c8e0ff;font-family:var(--mono);font-size:14px;padding:10px 14px;border-radius:4px;resize:none;outline:none;min-height:44px;max-height:110px;}
.mp-send{background:#ffd700;color:#000;border:none;font-family:var(--pixel);font-size:7px;padding:0 16px;border-radius:4px;cursor:pointer;height:44px;}
.mp-send:hover{background:#ffed4a;}
.mp-send:disabled{background:#1a2a44;color:#2a3a54;cursor:not-allowed;}
.mp-vbtn{width:44px;height:44px;border-radius:4px;border:1px solid var(--border);background:transparent;color:#3a5a7f;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mp-vbtn:hover{border-color:#60a5fa;color:#60a5fa;}
.mp-vbtn.on{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1);animation:pmic 1s infinite;}

/* CONFIG MODAL */
.cfg-ov{position:fixed;inset:0;background:rgba(3,6,16,.93);display:flex;align-items:center;justify-content:center;z-index:400;}
.cfg-box{background:#080e20;border:1px solid var(--border);border-radius:8px;padding:26px 30px;width:450px;max-width:94vw;}
.cfg-title{font-family:var(--pixel);font-size:8px;color:#60a5fa;margin-bottom:18px;}
.cfg-f{margin-bottom:11px;}
.cfg-l{font-family:var(--pixel);font-size:5px;color:#2a4a6f;margin-bottom:4px;}
.cfg-i{width:100%;background:#050a16;border:1px solid #1a3050;color:#c8e0ff;font-family:var(--mono);font-size:13px;padding:7px 10px;border-radius:3px;outline:none;}
.cfg-i:focus{border-color:#60a5fa;}
.cfg-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.cfg-ok{background:#22c55e;color:#000;border:none;font-family:var(--pixel);font-size:6px;padding:9px 16px;border-radius:3px;cursor:pointer;}
.cfg-cancel{background:transparent;color:#2a4060;border:1px solid #1a3050;font-family:var(--pixel);font-size:6px;padding:9px 12px;border-radius:3px;cursor:pointer;margin-left:auto;}
.cfg-res{font-family:var(--pixel);font-size:5px;padding:7px 10px;border-radius:3px;margin-top:10px;}
.cr-ok{color:#22c55e;background:rgba(34,197,94,.07);border:1px solid #22c55e;}
.cr-err{color:#f87171;background:rgba(248,113,113,.07);border:1px solid #f87171;}
.cr-info{color:#60a5fa;background:rgba(96,165,250,.07);border:1px solid #60a5fa;}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(5,8,18,0.98);border-top:1px solid #1a3058;display:flex;align-items:center;padding:0 16px;gap:12px;z-index:150;}
.bb-logo{font-family:var(--pixel);font-size:8px;color:#ffd700;text-shadow:0 0 12px #ffd70080;letter-spacing:1px;white-space:nowrap;}
.bb-div{width:1px;height:22px;background:#1a3058;flex-shrink:0;}
.bb-status{font-family:var(--pixel);font-size:4px;color:#3a5a7f;white-space:nowrap;}
.bb-input-wrap{flex:1;display:flex;gap:8px;align-items:center;}
.bb-ta{flex:1;background:rgba(10,18,40,.9);border:1px solid #1a3058;color:#c8e0ff;font-family:var(--mono);font-size:14px;padding:10px 14px;border-radius:4px;resize:none;outline:none;max-height:80px;}
.bb-ta:focus{border-color:#2a5a8f;}
.bb-voice{width:44px;height:44px;border-radius:4px;border:1px solid #1a3058;background:transparent;color:#3a5a7f;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bb-voice:hover{border-color:#60a5fa;color:#60a5fa;}
.bb-voice.on{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1);animation:pmic 1s infinite;}
.bb-send{background:#22c55e;color:#000;border:none;font-family:var(--pixel);font-size:7px;padding:0 18px;border-radius:4px;cursor:pointer;height:44px;flex-shrink:0;}
.bb-send:hover{background:#16a34a;}
.bb-meet{background:rgba(255,215,0,.1);color:#ffd700;border:1px solid rgba(255,215,0,.4);font-family:var(--pixel);font-size:6px;padding:0 14px;border-radius:4px;cursor:pointer;height:44px;flex-shrink:0;}
.bb-meet:hover{background:rgba(255,215,0,.2);}
.bb-cfg{background:transparent;color:#4a6a9f;border:1px solid #1a3058;font-family:var(--pixel);font-size:6px;padding:0 12px;border-radius:4px;cursor:pointer;height:44px;flex-shrink:0;}
.bb-cfg:hover{color:#60a5fa;border-color:#60a5fa;}

.rug{position:absolute;border-radius:6px;opacity:.45;}
.plant{position:absolute;font-size:22px;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.45));}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1a3058;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#2a4a78;}

/* Typing cursor blink for monitors when agent is typing */
.mon-typing .scr-cur{animation:cur .4s step-end infinite !important;}
</style>
</head>
<body>

async function callAgent(cfg,system,messages){
  try {
    const r=await fetch(cfg.endpoint+'/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':cfg.token,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:cfg.model,max_tokens:Number(cfg.maxTokens)||2048,system,messages})
    });
    if(!r.ok){throw new Error('HTTP '+r.status);}
    const d=await r.json();
    return d?.content?.[0]?.text || d?.choices?.[0]?.message?.content || 'No response.';
  } catch(e){ throw e; }
}

/* ══ WALKING AGENT ═════════════════════════════════════════════ */
function WalkingAgent({walker}){
  const {agent, x, y, targetX, targetY, progress, animClass, bubble, atTable, tableSlot} = walker;
  const li=agent.id.charCodeAt(agent.id.length-1)%6;
  // Table slot offsets: spread agents around the table
  const slotOffsets=[
    {x:-60,y:-10},{x:0,y:-20},{x:60,y:-10},
    {x:-80,y:20},{x:80,y:20}
  ];
  const slot=slotOffsets[tableSlot%slotOffsets.length];
  const displayX=atTable?(TABLE_CENTER.x+slot.x-36):(x+(targetX-x)*easeInOut(progress)-36);
  const displayY=atTable?(TABLE_CENTER.y+slot.y-48):(y+(targetY-y)*easeInOut(progress)-48);
  const deptColor=agent.deptColor||'#ffd700';
  return React.createElement('div',{
    className:'walker '+(atTable?'atTable':'walking')+' '+(animClass||''),
    style:{
      left:Math.max(0,Math.min(displayX, OFFICE_W-72))+'px',
      top:Math.max(0,Math.min(displayY, OFFICE_H-96))+'px',
      zIndex: atTable?(50+tableSlot):50
    }
  },
    bubble&&React.createElement('div',{
      className:'walker-bubble',
      style:{borderColor:deptColor,color:bubble.color||'#c8e0ff'}
    },bubble.text),
    React.createElement('div',{className:'walker-inner'},
      React.createElement(ChibiChar,{li,shirt:deptColor,isHugo:agent.id==='hugo',small:atTable,animClass})
    )
  );
}

/* ══ CHAT PANEL ═════════════════════════════════════════════════ */
function ChatPanel({agentData,dept,cfg,onClose,isAiMsg}){
  const[msgs,setMsgs]=React.useState([{id:uid(),role:'s',content:agentData.name+' online · '+agentData.role,time:tnow()}]);
  const[inp,setInp]=React.useState('');
  const[busy,setBusy]=React.useState(false);
  const endRef=React.useRef(null);
  React.useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,busy]);

  const send=React.useCallback(async(text)=>{
    const t=(text||inp).trim();
    if(!t||busy) return;
    setInp('');
    const um={id:uid(),role:'u',content:t,time:tnow()};
    setMsgs(p=>[...p,um]);
    setBusy(true);
    try{
      const hist=msgs.filter(m=>m.role==='u'||m.role==='a').map(m=>({role:m.role==='u'?'user':'assistant',content:m.content}));
      hist.push({role:'user',content:t});
      const r=await callAgent(cfg,agentData.sys,hist);
      setMsgs(p=>[...p,{id:uid(),role:'a',content:r,time:tnow(),isAi:true}]);
      if(window.speechSynthesis){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(r.slice(0,250));window.speechSynthesis.speak(u);}
    } catch(e){setMsgs(p=>[...p,{id:uid(),role:'s',content:'⚠ '+e.message,time:tnow()}]);}
    finally{setBusy(false);}
  },[inp,busy,cfg,agentData,msgs]);

  const c=dept?.deptColor||'#ffd700';
  return React.createElement('div',{className:'cpanel'},
    React.createElement('div',{className:'cp-head'},
      React.createElement('div',{className:'cp-av',style:{borderColor:c,background:c+'15',fontSize:22},
        React.createElement(ChibiChar,{li:agentData.id.charCodeAt(agentData.id.length-1)%6,shirt:c,isHugo:false})
      ),
      React.createElement('div',{style:{marginLeft:4}},
        React.createElement('div',{className:'cp-name',style:{color:c}},agentData.name),
        React.createElement('div',{className:'cp-role'},agentData.role),
        dept&&React.createElement('div',{className:'cp-dept',style:{color:c,borderColor:c+'40'}},dept.deptName||dept.name)
      ),
      React.createElement('button',{className:'cp-x',onClick:onClose},'✕')
    ),
    React.createElement('div',{className:'cp-msgs'},
      ...msgs.map(m=>React.createElement('div',{key:m.id,className:'cmsg '+(m.role==='u'?'u':'')},
        m.role!=='s'&&React.createElement('div',{className:'cmsg-meta'},m.role==='u'?'YOU':agentData.name,' · ',m.time),
        React.createElement('div',{className:'cmsg-b '+(m.role==='u'?'u':m.role==='a'?(m.isAi?'a':'s'):'s'),style:m.role==='a'&&m.isAi?{borderColor:c+'40'}:{}},m.content)
      )),
      busy&&React.createElement('div',{className:'cmsg-think',style:{borderColor:c+'40'}},
        React.createElement('div',{className:'dot',style:{background:c}}),
        React.createElement('div',{className:'dot',style:{background:c}}),
        React.createElement('div',{className:'dot',style:{background:c}}),
        React.createElement('span',{style:{color:c}},'Thinking...')
      ),
      React.createElement('div',{ref:endRef})
    ),
    React.createElement('div',{className:'cp-bar'},
      React.createElement('textarea',{className:'cp-ta',value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}},placeholder:'Message '+agentData.name+'...',rows:1}),
      React.createElement('button',{className:'v-btn',onClick:()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){const r=new SR();r.lang='en-US';r.continuous=false;r.onresult=ev=>{setInp(ev.results[0][0].transcript);};r.onerror=()=>alert('Speech error');r.start();}else alert('Voice not supported in this browser.')}},'🎙'),
      React.createElement('button',{className:'cp-send',onClick:()=>send(),disabled:!inp.trim()||busy,style:inp.trim()&&!busy?{background:c,color:'#000'}:{}},busy?'...':'▶')
    )
  );
}

/* ══ MEETING PANEL ═════════════════════════════════════════════ */
function MeetingPanel({cfg,onClose}){
  const[feed,setFeed]=React.useState([]);
  const[inp,setInp]=React.useState('');
  const[busy,setBusy]=React.useState(false);
  const[thk,setThk]=React.useState({});
  const endRef=React.useRef(null);
  React.useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[feed,thk]);

  const run=React.useCallback(async(text)=>{
    const t=(text||inp).trim();
    if(!t||busy) return;
    setInp('');setBusy(true);
    setFeed(p=>[...p,{id:uid(),type:'user',content:t}]);
    const init={};ALL_AGENTS.slice(0,6).forEach(a=>{init[a.id]=true;});setThk(init);
    await Promise.all(ALL_AGENTS.slice(0,6).map(async ag=>{
      try{
        const r=await callAgent({...cfg,maxTokens:200},ag.sys+'\n\nYou are in a team meeting. Give a brief 2-3 sentence response from your department perspective.',[{role:'user',content:t}]);
        setFeed(p=>[...p,{id:uid(),type:'agent',agent:ag,content:r}]);
      } catch(e){}
      setThk(p=>({...p,[ag.id]:false}));
    }));
    setBusy(false);setThk({});
  },[inp,busy,cfg]);

  return React.createElement('div',{className:'mpanel'},
    React.createElement('div',{className:'mp-head'},
      React.createElement('div',null,
        React.createElement('div',{className:'mp-title'},'🐾 TEAM MEETING'),
        React.createElement('div',{className:'mp-chips'},
          ...ALL_AGENTS.slice(0,6).map(a=>React.createElement('div',{key:a.id,className:'mp-chip',style:{color:a.deptColor,borderColor:a.deptColor+'40',background:a.deptColor+'10'}},a.name))
        )
      ),
      React.createElement('button',{className:'mp-x',onClick:onClose},'✕')
    ),
    React.createElement('div',{className:'mp-feed'},
      feed.length===0&&React.createElement('div',{style:{fontFamily:"'Press Start 2P'",fontSize:'6px',color:'#1a3050',textAlign:'center',marginTop:40}},'RAISE A TOPIC — ALL AGENTS RESPOND'),
      ...feed.map(item=>item.type==='user'?(
        React.createElement('div',{key:item.id,style:{display:'flex',justifyContent:'flex-end'}},
          React.createElement('div',{style:{maxWidth:'60%',background:'rgba(96,165,250,.08)',border:'1px solid rgba(96,165,250,.25)',borderRadius:'4px 4px 0 4px',padding:'10px 14px',fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:'#c8e0ff',lineHeight:1.65}},item.content)
        )
      ):(
        React.createElement('div',{key:item.id,className:'mp-msg'},
          React.createElement('div',{className:'mp-av',style:{borderColor:item.agent.deptColor,background:item.agent.deptColor+'12',fontSize:12},
            React.createElement(ChibiChar,{li:item.agent.id.charCodeAt(item.agent.id.length-1)%6,shirt:item.agent.deptColor,small:true})
          ),
          React.createElement('div',{className:'mp-body'},
            React.createElement('div',{className:'mp-mname',style:{color:item.agent.deptColor}},item.agent.name),
            React.createElement('div',{className:'mp-text'},item.content)
          )
        )
      )),
      ...Object.entries(thk).filter(([,v])=>v).map(([id])=>{
        const ag=ALL_AGENTS.find(a=>a.id===id);
        if(!ag)return null;
        return React.createElement('div',{key:id,className:'mp-msg'},
          React.createElement('div',{className:'mp-av',style:{borderColor:ag.deptColor,background:ag.deptColor+'12'},
            React.createElement(ChibiChar,{li:ag.id.charCodeAt(ag.id.length-1)%6,shirt:ag.deptColor,small:true})
          ),
          React.createElement('div',{className:'mp-body'},
            React.createElement('div',{className:'mp-mname',style:{color:ag.deptColor}},ag.name),
            React.createElement('div',{className:'mp-think'},
              React.createElement('div',{className:'dot',style:{background:ag.deptColor}}),
              React.createElement('div',{className:'dot',style:{background:ag.deptColor}}),
              React.createElement('div',{className:'dot',style:{background:ag.deptColor}}),
              React.createElement('span',{style:{color:ag.deptColor}},'Speaking...')
            )
          )
        );
      }),
      React.createElement('div',{ref:endRef})
    ),
    React.createElement('div',{className:'mp-bar'},
      React.createElement('textarea',{className:'mp-ta',value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();run();}},placeholder:'Raise a topic for the whole team...',rows:1}),
      React.createElement('button',{className:'mp-vbtn',onClick:()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){const r=new SR();r.lang='en-US';r.continuous=false;r.onresult=ev=>{setInp(ev.results[0][0].transcript);setTimeout(()=>run(ev.results[0][0].transcript),300);};r.onerror=()=>alert('Speech error');r.start();}else alert('Voice not supported.')}},'🎙'),
      React.createElement('button',{className:'mp-send',onClick:()=>run(),disabled:!inp.trim()||busy},busy?'...':'ALL AGENTS ▶')
    )
  );
}

/* ══ MAIN APP ════════════════════════════════════════════════════ */
function ApexOffice(){
  const[cfg,setCfg]=React.useState(DEFAULT_CFG);
  const[cfgD,setCfgD]=React.useState(DEFAULT_CFG);
  const[showCfg,setShowCfg]=React.useState(false);
  const[cfgRes,setCfgRes]=React.useState(null);
  const[testing,setTesting]=React.useState(false);
  const[active,setActive]=React.useState(null);
  const[showMeet,setShowMeet]=React.useState(false);
  const[bbInp,setBbInp]=React.useState('');
  const[bbBusy,setBbBusy]=React.useState(false);
  const[walkers,setWalkers]=React.useState([]);
  const[voiceOn,setVoiceOn]=React.useState(false);
  const[chatLog,setChatLog]=React.useState([]); // shared chat history

  // Animation frame ref
  const animRef=React.useRef(null);
  const walkStateRef=React.useRef({walkers:[], nextSpawn:0, meetingMode:false});

  /* ── WALKER AI THINK LOOP ─────────────────────────────── */
  React.useEffect(()=>{
    let lastTime=0;
    function tick(time){
      const dt=time-lastTime;
      lastTime=time;
      const ws=walkStateRef.current;
      ws.nextSpawn-=dt;
      // Move walkers
      let changed=false;
      ws.walkers=ws.walkers.map(w=>{
        if(w.phase==='walk'){
          w.progress+=dt/1800;
          if(w.progress>=1){w.progress=1;w.phase='arrived';w.x=w.targetX;w.y=w.targetY;}
          changed=true;
        } else if(w.phase==='arrived'){
          if(!w.atTable){
            w.atTable=true;
            w.progress=0;
            changed=true;
          } else {
            w.progress+=dt/5000;
            if(w.progress>=1){w.phase='return';w.progress=0;changed=true;}
          }
        } else if(w.phase==='return'){
          w.progress+=dt/1800;
          if(w.progress>=1){w.phase='done';changed=true;}
        }
        return w;
      }).filter(w=>w.phase!=='done');
      if(changed) setWalkers([...ws.walkers]);
      animRef.current=requestAnimationFrame(tick);
    }
    animRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(animRef.current);
  },[]);

  /* ── SPAWN WALKER ──────────────────────────────────── */
  const spawnWalker=React.useCallback((agent,targetX,targetY,atTable,slot,bubble,animClass)=>{
    const pos=AGENT_POSITIONS[agent.id]||{x:665,y:300};
    const w={
      id:uid(),agentId:agent.id,agent,
      x:pos.x,y:pos.y,
      targetX:targetX||TABLE_CENTER.x-36,
      targetY:targetY||TABLE_CENTER.y-48,
      progress:0,phase:'walk',
      atTable:false,tableSlot:slot||0,
      bubble:bubble||null,
      animClass:animClass||'thinking'
    };
    walkStateRef.current.walkers.push(w);
    setWalkers([...walkStateRef.current.walkers]);
    return w;
  },[]);

  /* ── SEND TO ALL ────────────────────────────────────── */
  const sendToAll=React.useCallback(async(text)=>{
    if(!text.trim()||bbBusy) return;
    setBbBusy(true);
    // Add to shared chat log
    setChatLog(p=>[...p,{id:uid(),role:'u',content:text,time:tnow()}]);
    // Find best agent + alsoCouldHelp
    const agentList=ALL_AGENTS.map(a=>({...a,score:0}));
    try {
      const selResp=await callAgent({...cfg,maxTokens:300},
        'You are a team coordinator. Hugo asked: "'+text+'"\n\nYour team:\n'+ALL_AGENTS.map(a=>a.name+' ('+a.deptName+', '+a.role+')').join('\n')+'\n\nRespond with JSON only:\n{"primary":"agent-id","alsoCouldHelp":[{"agent":"agent-id","says":"short offer"}],"reasoning":"1 sentence"}\n\nChoose the BEST match for this query. Also list 1-3 others who could help with a SHORT specific offer (max 5 words each).',
        [{role:'user',content:text}]
      );
      let parsed=null;
      try{parsed=JSON.parse(selResp.replace(/```json\n?|\n?```/g,'').trim());}catch(e){}
      // Primary agent walks in
      const primary=parsed?ALL_AGENTS.find(a=>a.id===parsed.primary):ALL_AGENTS[Math.floor(Math.random()*ALL_AGENTS.length)];
      // Thinking animation first
      spawnWalker(primary,TABLE_CENTER.x-36,TABLE_CENTER.y-48,true,0,{text:'Let me think...',color:primary.deptColor},'thinking');
      await new Promise(r=>setTimeout(r,800));
      // Get actual response
      const hist=[{role:'user',content:text}];
      const r=await callAgent(cfg,primary.sys,hist);
      // Update bubble with actual response
      const wIdx=walkStateRef.current.walkers.findIndex(w=>w.agentId===primary.id&&w.phase!=='return'&&w.phase!=='done');
      if(wIdx>=0){
        walkStateRef.current.walkers[wIdx].bubble={text:r.slice(0,120),color:primary.deptColor};
        walkStateRef.current.walkers[wIdx].animClass='working';
        setWalkers([...walkStateRef.current.walkers]);
      }
      // Add to chat
      setChatLog(p=>[...p,{id:uid(),role:'a',agent:primary,content:r,time:tnow()}]);
      // AlsoCouldHelp walk in
      if(parsed?.alsoCouldHelp){
        parsed.alsoCouldHelp.slice(0,2).forEach((h,i)=>{
          const ag=ALL_AGENTS.find(a=>a.id===h.agent);
          if(ag) spawnWalker(ag,TABLE_CENTER.x+(i+1)*60-36,TABLE_CENTER.y-48+20,true,i+1,{text:h.says,color:ag.deptColor},'thinking');
        });
      }
      // Return after delay
      setTimeout(()=>{
        const wi=walkStateRef.current.walkers.findIndex(w=>w.agentId===primary.id);
        if(wi>=0){walkStateRef.current.walkers[wi].phase='return';walkStateRef.current.walkers[wi].progress=0;walkStateRef.current.walkers[wi].bubble=null;setWalkers([...walkStateRef.current.walkers]);}
      },5000);
    } catch(e){
      setChatLog(p=>[...p,{id:uid(),role:'s',content:'⚠ '+e.message,time:tnow()}]);
    }
    setBbBusy(false);
  },[cfg,bbBusy]);

  /* ── VOICE TO ALL ────────────────────────────────────── */
  const voiceToAll=React.useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Voice not supported in this browser.');return;}
    setVoiceOn(true);
    const r=new SR();
    r.lang='en-US';r.continuous=false;r.interimResults=false;
    r.onresult=ev=>{
      const txt=ev.results[0][0].transcript;
      setBbInp(txt);
      setTimeout(()=>sendToAll(txt),200);
      setVoiceOn(false);
    };
    r.onend=()=>setVoiceOn(false);
    r.onerror=()=>setVoiceOn(false);
    r.start();
  },[sendToAll]);

  /* ── START MEETING ─────────────────────────────────── */
  const startMeeting=React.useCallback(()=>{
    setShowMeet(true);
    // Walk first 6 agents to table
    walkStateRef.current.meetingMode=true;
    ALL_AGENTS.slice(0,6).forEach((ag,i)=>{
      setTimeout(()=>{
        spawnWalker(ag,TABLE_CENTER.x-36,TABLE_CENTER.y-48,true,i,null,'thinking');
      },i*400);
    });
  },[spawnWalker]);

  /* ── TEST CONN ───────────────────────────────────────── */
  const testConn=async()=>{
    setTesting(true);setCfgRes({t:'info',m:'Pinging...'});
    try{
      const r=await fetch(cfgD.endpoint+'/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':cfgD.token,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:cfgD.model,max_tokens:20,messages:[{role:'user',content:'Reply: OK'}]})});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const d=await r.json();
      setCfgRes({t:'ok',m:'✓ CONNECTED — '+(d?.content?.[0]?.text||'').slice(0,50)});
    }catch(e){setCfgRes({t:'err',m:'✗ '+e.message});}
    finally{setTesting(false);}
  };

  /* ── OPEN AGENT ─────────────────────────────────────── */
  const open=(agent,dept)=>{
    if(active?.agent.id===agent.id){setActive(null);return;}
    setActive({agent,dept});
  };

  return React.createElement(React.Fragment,null,

    /* OFFICE */
    React.createElement('div',{className:'scene-outer'},
      React.createElement('div',{className:'scene-wrap'},
        React.createElement('div',{className:'office'},

          /* BACK WALL */
          React.createElement('div',{className:'back-wall'},
            ...[0,1,2,3,4].map(i=>React.createElement('div',{key:i,className:'ww'},
              React.createElement('div',null),React.createElement('div',null),React.createElement('div',null),React.createElement('div',null)))
          ),

          /* RUGS */
          React.createElement('div',{className:'rug',style:{left:220,top:243,width:200,height:185,background:'#5a3a8a'}}),
          React.createElement('div',{className:'rug',style:{left:876,top:243,width:196,height:185,background:'#2a5a5a'}}),
          React.createElement('div',{className:'rug',style:{left:10,top:466,width:420,height:200,background:'#3a5a3a'}}),

          /* PLANTS */
          ...[[1300,10],[1300,200],[1300,400],[1300,590],[10,654],[230,656],[450,656],[660,656],[870,656],[1080,656],[0,445],[0,220]].map(([x,y],i)=>
            React.createElement('div',{key:i,className:'plant',style:{left:x,top:y}},'🌿')),

          /* ZONES */
          ...DEPTS.map(d=>React.createElement(Zone,{key:d.id,dept:d,onAgentClick:open,activeId:active?.agent?.id,walkers})),

          /* MEETING ROOM */
          React.createElement('div',{className:'mzone',style:{left:MZONE.x,top:MZONE.y,width:MZONE.w,height:MZONE.h}},
            React.createElement('div',{className:'mzone-head'},'🏢 ',React.createElement('span',null,'MEETING ROOM')),
            React.createElement('div',{className:'mtable',style:{left:MZONE.w/2-74,top:28,width:148,height:108}},
              React.createElement('span',{style:{fontSize:30}},'☕')
            ),
            React.createElement('div',{className:'meet-hint',onClick:startMeeting},'▶ CLICK TABLE — START MEETING'),

            /* HUGO IN MEETING */
            React.createElement('div',{className:'hugo-wrap',style:{position:'absolute',left:MZONE.w/2-56,top:90},onClick:()=>open(HUGO,{deptName:'EXECUTIVE',deptColor:'#ffd700'})},
              React.createElement('div',{className:'hugo-desk'},
                React.createElement(HugoDesk,null)
              ),
              React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center'}},
                React.createElement(ChibiChar,{li:0,shirt:'#ffd700',isHugo:true}),
                React.createElement('div',{style:{fontFamily:"'Press Start 2P'",fontSize:'5px',padding:'2px 6px',borderRadius:2,background:'rgba(4,7,18,.97)',color:'#ffd700',marginTop:2}},HUGO.name)
              )
            )
          ),

          /* WALKING AGENTS */
          ...walkers.map(w=>React.createElement(WalkingAgent,{key:w.id,walker:w})),

          /* FOOTER HINT */
          React.createElement('div',{style:{position:'absolute',bottom:6,left:'50%',transform:'translateX(-50%)',fontFamily:"'Press Start 2P'",fontSize:'5px',color:'rgba(255,255,255,0.1)',pointerEvents:'none',whiteSpace:'nowrap'}},'CLICK AGENT TO CHAT · CLICK TABLE FOR MEETING'),
        )
      )
    ),

    /* BOTTOM BAR */
    React.createElement('div',{className:'bottom-bar'},
      React.createElement('span',{className:'bb-logo'},'🐾 APEX HQ'),
      React.createElement('div',{className:'bb-div'}),
      React.createElement('span',{className:'bb-status'},'11 DEPTS · 23 AGENTS'),
      React.createElement('div',{className:'bb-input-wrap'},
        React.createElement('textarea',{
          className:'bb-ta',value:bbInp,
          onChange:e=>setBbInp(e.target.value),
          onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendToAll(bbInp);}},
          placeholder:'Ask anything — best agent will respond...',rows:1
        }),
        React.createElement('button',{className:'bb-voice '+(voiceOn?'on':''),onClick:voiceToAll,title:'Voice input'},'🎙'),
        React.createElement('button',{
          className:'bb-send',onClick:()=>sendToAll(bbInp),disabled:!bbInp.trim()||bbBusy,
          style:bbInp.trim()&&!bbBusy?{background:'#22c55e',color:'#000'}:{}
        },bbBusy?'...':'SEND TO ALL ▶')
      ),
      React.createElement('button',{className:'bb-meet',onClick:startMeeting},'🏢 MEETING'),
      React.createElement('button',{className:'bb-cfg',onClick:()=>{setCfgD(cfg);setShowCfg(true);setCfgRes(null);}},'⚙')
    ),

    /* CHAT OVERLAY */
    active&&React.createElement(ChatPanel,{agentData:active.agent,dept:active.dept,cfg,onClose:()=>setActive(null),isAiMsg:true}),

    /* MEETING OVERLAY */
    showMeet&&React.createElement(MeetingPanel,{cfg,onClose:()=>setShowMeet(false)}),

    /* CONFIG OVERLAY */
    showCfg&&React.createElement('div',{className:'cfg-ov'},
      React.createElement('div',{className:'cfg-box'},
        React.createElement('div',{className:'cfg-title'},'⚙ OPENCLAW CONFIG'),
        ...[['ENDPOINT','endpoint'],['API TOKEN','token'],['MODEL','model'],['MAX TOKENS','maxTokens']].map(([l,k])=>
          React.createElement('div',{key:k,className:'cfg-f'},
            React.createElement('div',{className:'cfg-l'},l),
            React.createElement('input',{className:'cfg-i',type:k==='token'?'password':'text',value:cfgD[k],onChange:e=>setCfgD(p=>({...p,[k]:e.target.value}))})
          )
        ),
        cfgRes&&React.createElement('div',{className:'cfg-res '+(cfgRes.t==='ok'?'cr-ok':cfgRes.t==='err'?'cr-err':'cr-info')},cfgRes.m),
        React.createElement('div',{className:'cfg-btns'},
          React.createElement('button',{className:'cfg-ok',onClick:()=>{setCfg(cfgD);setShowCfg(false);}},'SAVE & CLOSE'),
          React.createElement('button',{className:'cfg-ok',onClick:testConn,disabled:testing,style:{background:testing?'#1a3050':'#60a5fa',color:testing?'#2a4060':'#000'}},testing?'TESTING...':'TEST CONNECTION'),
          React.createElement('button',{className:'cfg-cancel',onClick:()=>setShowCfg(false)},'CANCEL')
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ApexOffice));
</script>
